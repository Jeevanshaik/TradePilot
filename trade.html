<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10B981" />
    <meta name="description" content="TradePilot — AI-powered intraday trading dashboard" />

    <link rel="icon" type="image/svg+xml" href="/trade-icon.svg" />
    <title>TradePilot — AI Trading Dashboard</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #060D0A;
        overflow-x: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      body {
        padding-top:    env(safe-area-inset-top,    0);
        padding-bottom: env(safe-area-inset-bottom, 0);
        padding-left:   env(safe-area-inset-left,   0);
        padding-right:  env(safe-area-inset-right,  0);
      }

      /* ── Splash screen ── */
      #tp-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(160deg,#060D0A 0%,#0A1F15 50%,#050C09 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: #E2FFF6;
        transition: opacity .35s ease;
      }

      @keyframes tp-pulse {
        0%, 100% { transform: scale(1);    opacity: 1; }
        50%       { transform: scale(1.15); opacity: .85; }
      }
      @keyframes tp-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @keyframes tp-fadeup {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes tp-bar {
        0%   { width: 0%; }
        100% { width: 100%; }
      }
      @keyframes tp-dot {
        0%, 60%, 100% { opacity: .25; transform: translateY(0); }
        30%            { opacity: 1;   transform: translateY(-5px); }
      }

      .tp-icon  {
        font-size: 72px;
        animation: tp-pulse 1.6s ease-in-out infinite;
      }
      .tp-title {
        font-size: 36px; font-weight: 900; margin-top: 18px;
        letter-spacing: -1px;
        background: linear-gradient(90deg,#10B981 0%,#34D399 30%,#6EE7B7 60%,#10B981 100%);
        background-size: 200% 100%;
        animation: tp-shimmer 2.5s linear infinite, tp-fadeup .6s ease both;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .tp-sub {
        font-size: 11px; color: rgba(16,185,129,.55);
        letter-spacing: 2px; margin-top: 6px;
        animation: tp-fadeup .7s ease .2s both;
      }
      .tp-bar-wrap {
        width: 180px; height: 3px; background: rgba(16,185,129,.12);
        border-radius: 99px; margin-top: 32px; overflow: hidden;
        animation: tp-fadeup .8s ease .4s both;
      }
      .tp-bar {
        height: 100%; background: linear-gradient(90deg,#059669,#34D399);
        border-radius: 99px;
        animation: tp-bar 1.8s ease forwards;
      }
      .tp-dots {
        display: flex; gap: 5px; margin-top: 20px;
        animation: tp-fadeup .8s ease .5s both;
      }
      .tp-dot {
        font-size: 20px; color: #10B981;
        animation: tp-dot 1.4s ease-in-out infinite;
      }
      .tp-dot:nth-child(2) { animation-delay: .2s; }
      .tp-dot:nth-child(3) { animation-delay: .4s; }

      /* grid bg on splash */
      .tp-grid {
        position: absolute; inset: 0; z-index: -1;
        background-image:
          linear-gradient(rgba(16,185,129,.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16,185,129,.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="tp-splash">
        <div class="tp-grid"></div>
        <div class="tp-icon">📈</div>
        <div class="tp-title">TradePilot</div>
        <div class="tp-sub">AI TRADING DASHBOARD</div>
        <div class="tp-bar-wrap"><div class="tp-bar"></div></div>
        <div class="tp-dots">
          <span class="tp-dot">•</span>
          <span class="tp-dot">•</span>
          <span class="tp-dot">•</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/trade.jsx"></script>

    <script>
      // Auto-remove splash once React mounts
      (function () {
        var tries = 0;
        var iv = setInterval(function () {
          var root   = document.getElementById("root");
          var splash = document.getElementById("tp-splash");
          if (!root || !splash) { clearInterval(iv); return; }
          if (root.children.length > 1 || (root.firstChild && root.firstChild !== splash)) {
            splash.style.opacity = "0";
            setTimeout(function () { try { splash.remove(); } catch (_) {} }, 350);
            clearInterval(iv);
          }
          if (++tries > 200) clearInterval(iv);
        }, 100);
      })();
    </script>
  </body>
</html>
